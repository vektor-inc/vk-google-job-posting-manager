name: Deploy to WordPress.org
on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+'

permissions:
    contents: write

env:
    plugin_name: vk-google-job-posting-manager

jobs:
    smoke_test:
        name: Smoke Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.2
            - name: Install NPM Scripts
              run: npm install
            - name: Create dist
              run: npm run dist
            - name: Setup wp-env override for dist
              run: |
                  echo '{"plugins":["./dist/${{ env.plugin_name }}"]}' > wp-env.override.json
            - name: Start wp-env
              run: |
                  for n in 1 2 3; do npx wp-env start --update && break || [ "$n" -lt 3 ] || exit 1; done
            - name: Smoke test
              uses: vektor-inc/wp-actions/smoke-test@main
            - name: Upload dist artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/

    php_unit:
        name: PHP Unit Test on PHP ${{ matrix.php-versions }} / WP ${{ matrix.wp-versions }}
        runs-on: ubuntu-latest
        needs: [smoke_test]
        strategy:
            matrix:
                php-versions: ['7.4', '8.2']
                wp-versions: ['6.6', '6.9']
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Cache vendor
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-php${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
            - name: Setup PHP ${{ matrix.php-versions }}
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ matrix.php-versions }}
            - name: Install NPM Scripts
              run: npm install
            - name: Install Composer Packages
              run: composer install
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Copy test dependencies into dist for phpunit
              run: |
                  cp -r vendor dist/${{ env.plugin_name }}/vendor
                  for f in .phpunit.xml phpunit.xml phpunit.xml.dist; do
                    [ -f "$f" ] && cp "$f" "dist/${{ env.plugin_name }}/$f" || true
                  done
                  [ -d tests ] && cp -r tests "dist/${{ env.plugin_name }}/tests" || true
            - name: Create wp-env.override.json for dist
              run: |
                  echo '{"plugins":["./dist/${{ env.plugin_name }}"]}' > wp-env.override.json
            - name: Start wp-env
              run: |
                  n=0
                  until [ $n -ge 5 ]
                  do
                      WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} WP_ENV_PHP_VERSION=${{ matrix.php-versions }} npx wp-env start --update && break
                      n=$((n+1))
                      echo "Retrying wp-env start --update ($n)..."
                      sleep 15
                  done
                  [ $n -lt 5 ] || exit 1
            - name: Run PHP Unit Test
              run: npm run phpunit

    deploy:
        name: Deploy to WordPress.org
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        steps:
            - uses: actions/checkout@v4
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: WordPress Plugin Deploy
              uses: 10up/action-wordpress-plugin-deploy@stable
              env:
                  BUILD_DIR: dist/${{ env.plugin_name }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SLUG: ${{ env.plugin_name }}

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        steps:
            - uses: actions/checkout@v4
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  files: dist/${{ env.plugin_name }}.zip
