name: Deploy to WordPress.org
on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+'

permissions:
    contents: read

env:
    plugin_name: vk-google-job-posting-manager

jobs:
    smoke_test:
        name: Smoke Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Setup PHP
              # shivammathur/setup-php v2
              uses: shivammathur/setup-php@728c6c6b8cf02c2e48117716a91ee48313958a19
              with:
                  php-version: 8.2
            - name: Install NPM Scripts
              run: npm ci
            - name: Create dist
              run: npm run dist
            - name: Setup wp-env override for dist
              run: |
                  echo '{"plugins":["./dist/${{ env.plugin_name }}"]}' > wp-env.override.json
            - name: Start wp-env
              run: |
                  for n in 1 2 3; do npx wp-env start --update && break || [ "$n" -lt 3 ] || exit 1; done
            - name: Smoke test
              # vektor-inc/wp-actions main as of 2026-03-18
              uses: vektor-inc/wp-actions/smoke-test@90f5a231bc956543bf235f36be4928d57af2edab
            - name: Upload dist artifact
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/
                  retention-days: 7

    php_unit:
        name: PHP Unit Test on PHP ${{ matrix.php-versions }} / WP ${{ matrix.wp-versions }}
        runs-on: ubuntu-latest
        needs: [smoke_test]
        strategy:
            matrix:
                php-versions: ['7.4', '8.2']
                wp-versions: ['6.6', '6.9']
        steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20.x
            - name: Cache vendor
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: ${{ runner.os }}-php${{ matrix.php-versions }}-${{ hashFiles('**/composer.lock') }}
            - name: Setup PHP ${{ matrix.php-versions }}
              # shivammathur/setup-php v2
              uses: shivammathur/setup-php@728c6c6b8cf02c2e48117716a91ee48313958a19
              with:
                  php-version: ${{ matrix.php-versions }}
            - name: Install NPM Scripts
              run: npm ci
            - name: Install Composer Packages
              run: composer install
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Copy test dependencies into dist for phpunit
              run: |
                  rm -rf "dist/${{ env.plugin_name }}/vendor"
                  cp -r vendor "dist/${{ env.plugin_name }}/vendor"
                  for f in .phpunit.xml phpunit.xml phpunit.xml.dist; do
                    [ -f "$f" ] && cp "$f" "dist/${{ env.plugin_name }}/$f" || true
                  done
                  [ -d tests ] && cp -r tests "dist/${{ env.plugin_name }}/tests" || true
            - name: Create wp-env.override.json for dist
              run: |
                  echo '{"plugins":["./dist/${{ env.plugin_name }}"]}' > wp-env.override.json
            - name: Start wp-env
              run: |
                  for n in 1 2 3 4 5; do
                      WP_ENV_CORE=WordPress/WordPress#${{ matrix.wp-versions }} WP_ENV_PHP_VERSION=${{ matrix.php-versions }} npx wp-env start --update && break
                      [ "$n" -lt 5 ] || exit 1
                      echo "Retrying wp-env start --update ($n)..."
                      sleep 15
                  done
            - name: Run PHP Unit Test
              run: npm run phpunit

    deploy:
        name: Deploy to WordPress.org
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        steps:
            - uses: actions/checkout@v4
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: WordPress Plugin Deploy
              # 10up/action-wordpress-plugin-deploy 2.3.0 / stable
              uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2
              env:
                  BUILD_DIR: dist/${{ env.plugin_name }}
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SLUG: ${{ env.plugin_name }}

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: [smoke_test, php_unit]
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            - name: Download dist artifact
              uses: actions/download-artifact@v4
              with:
                  name: dist
                  path: dist/
            - name: Create Release
              # softprops/action-gh-release v2.6.1 / v2
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
              with:
                  generate_release_notes: true
                  files: dist/${{ env.plugin_name }}.zip
